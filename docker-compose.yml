version: "3.8"

services:

  # ── 1. PostgreSQL 15 Database ──────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: propiq_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d   # mounts schema SQL files
    ports:
      - "5432:5432"
    networks:
      - propiq_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── 2. Redis 7 Cache ───────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: propiq_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    networks:
      - propiq_net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── 3. Fast-Data Hub (Node.js) ─────────────────────────────
  hub:
    build: ./hub
    container_name: propiq_hub
    restart: unless-stopped
    ports:
      - "3002:3002"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - propiq_net

  # ── 4. FastAPI ML Backend ──────────────────────────────────
  api:
    build: ./api
    container_name: propiq_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - propiq_net

  # ── 5. Streamlit Dashboard ─────────────────────────────────
  dashboard:
    build: ./dashboard
    container_name: propiq_dashboard
    restart: unless-stopped
    ports:
      - "3000:8501"
    env_file: .env
    depends_on:
      - api
    networks:
      - propiq_net

volumes:
  postgres_data:

networks:
  propiq_net:
    driver: bridge
