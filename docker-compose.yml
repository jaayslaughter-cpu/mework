version: '3.9'

services:
  # ── Postgres (bet ledger, agent stats, CLV tracking) ─────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: propiq-postgres
    environment:
      POSTGRES_DB:       propiq
      POSTGRES_USER:     propiq_user
      POSTGRES_PASSWORD: propiq_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U propiq_user -d propiq"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (mlb_hub, bet_analyzer_cache, agent weights, feature sets) ──────
  redis:
    image: redis:7-alpine
    container_name: propiq-redis
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Zookeeper (Kafka dependency) ──────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: propiq-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME:   2000
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Kafka (bet_queue + abort_queue topics) ────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: propiq-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID:                        1
      KAFKA_ZOOKEEPER_CONNECT:                zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS:             PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP:   PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME:       PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE:        "true"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── Spring Boot (7-Tasklet orchestrator) ─────────────────────────────────
  propiq-app:
    build:
      context: ./spring-boot
      dockerfile: Dockerfile.spring
    container_name: propiq-app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      # Database
      SPRING_DATASOURCE_URL:      jdbc:postgresql://postgres:5432/propiq
      SPRING_DATASOURCE_USERNAME: propiq_user
      SPRING_DATASOURCE_PASSWORD: propiq_secret
      # Redis
      SPRING_REDIS_HOST:          redis
      SPRING_REDIS_PORT:          "6379"
      # Kafka
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      # API Keys
      PROPIQ_APIS_THEODDS_KEY:    ${THEODDS_API_KEY}
      PROPIQ_APIS_SPORTSDATA_KEY: ${SPORTSDATA_API_KEY}
      PROPIQ_APIS_TANK01_KEY:     ${TANK01_API_KEY}
      PROPIQ_APIS_APIFY_KEY:      ${APIFY_API_KEY}
      # Telegram
      PROPIQ_TELEGRAM_BOT_TOKEN:  ${TELEGRAM_BOT_TOKEN}
      PROPIQ_TELEGRAM_CHAT_ID:    ${TELEGRAM_CHAT_ID}
    restart: unless-stopped

  # ── Python ML Microservice (XGBoost train + predict) ────────────────────
  propiq-ml:
    build:
      context: .
      dockerfile: Dockerfile.ml
    container_name: propiq-ml
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://propiq_user:propiq_secret@postgres:5432/propiq
    restart: unless-stopped

volumes:
  postgres_data:
