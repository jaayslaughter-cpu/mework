version: "3.9"

services:

  # ─── 1. PostgreSQL 15 Database ──────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: propiq_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    networks:
      - propiq_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── 2. Redis 7 Cache ────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: propiq_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    networks:
      - propiq_net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── 3. Fast-Data Hub (Node.js) ─────────────────────────────
  hub:
    build: ./hub
    container_name: propiq_hub
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      - PORT=3002
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_HOST=postgres
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - ENABLE_SYNC_WORKER=true
      - ODDS_API_KEY=${ODDS_API_KEY}
      - SPORTSDATA_API_KEY=${SPORTSDATA_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - propiq_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3002/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── 4. FastAPI ML Engine ───────────────────────────────────
  engine:
    build: ./api
    container_name: propiq_engine
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_HOST=postgres
      - SPORTSBLAZE_API_KEY=${SPORTSBLAZE_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - propiq_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── 5. Next.js Frontend ───────────────────────────────────────
  frontend:
    build: ./frontend
    container_name: propiq_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_HUB_URL=http://localhost:3002
      - NEXT_PUBLIC_ENGINE_URL=http://localhost:8000
    depends_on:
      - hub
      - engine
    networks:
      - propiq_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:

networks:
  propiq_net:
    driver: bridge
