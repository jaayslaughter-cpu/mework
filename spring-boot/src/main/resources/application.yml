spring:
  application:
    name: propiq-analytics
  batch:
    job:
      enabled: false          # Tasklets run on @Scheduled, NOT on boot
    jdbc:
      initialize-schema: always
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/propiq}
    username: ${SPRING_DATASOURCE_USERNAME:propiq_admin}
    password: ${SPRING_DATASOURCE_PASSWORD:sharp_money_2026}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 4
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
    consumer:
      group-id: propiq-dfs-consumer
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.propiq.*"

# PropIQ-specific configuration
propiq:
  apis:
    sportsdata:
      key: ${SPORTSDATA_API_KEY:c2abf26f55714d228c7c311290f956d7}
      base-url: https://api.sportsdata.io/v3/mlb
    theodds:
      key: ${THEODDS_API_KEY:e4e30098807a9eece674d85e30471f03}
      base-url: https://api.the-odds-api.com/v4
    tank01:
      key: ${TANK01_API_KEY:58a304828bmshcbb94dbde04853fp12d39cjsn002951acdfed}
      base-url: https://tank01-baseball-v1.p.rapidapi.com
      host: tank01-baseball-v1.p.rapidapi.com
    apify:
      key: ${APIFY_API_KEY:}
      base-url: https://api.apify.com/v2
  books:
    targets: draftkings,fanduel,betmgm,bet365  # California-legal offshore books only
  ml:
    service-url: ${ML_ENGINE_URL:http://localhost:5000}
    baseline-accuracy: 0.777
    target-accuracy: 0.842
  polling:
    datahub-ms: 15000      # Every 15s — fast live data
    agent-ms: 30000        # Every 30s — agent evaluation
    analyzer-ms: 5000      # Every 5s  — pre-compute EV cache
    leaderboard-ms: 60000  # Every 60s — capital allocation
    # The Odds API MUST poll every 5 min (300s) — protect quota
    odds-api-cycles: 20    # 20 × 15s = 300s = 5 minutes
    sportsdata-cycles: 4   # 4  × 15s = 60s
    apify-cycles: 20       # 20 × 15s = 5 minutes
  agents:
    base-unit: 1.0
    top-tier-multiplier: 2.0
    cold-tier-multiplier: 0.5
    kelly-fraction: 0.25
    ev-threshold: 5.0
    trailing-days: 14
  thresholds:
    min-fip: 3.80
    min-swstr: 12.0
    min-xwoba: 0.360
    min-ump-k-pct: 22.0
    max-public-pct: 70.0    # FadeAgent trigger
    min-line-movement: 5.0  # LiveAgent trigger
    min-arb-edge: 1.0
    bullpen-fatigue-max-pitches: 25

# Logging
logging:
  level:
    com.propiq: DEBUG
    org.springframework.batch: WARN
    org.springframework.kafka: WARN
    org.hibernate.SQL: WARN

# Actuator / Prometheus metrics
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
