# PropIQ Agent Configuration — Central Control Panel
# Version is baked into every DB record so you know exactly which logic ran.
# Edit this file to toggle agents, override thresholds, or force fallback modes.
# Railway redeploys on every git push — no code changes needed for config changes.

version: "2026.1"
config_updated: "2026-03-25"

# ---------------------------------------------------------------------------
# RISK MANAGEMENT (global)
# ---------------------------------------------------------------------------
risk:
  bankroll: 1000.0                   # Total bankroll in USD
  max_daily_stake_pct: 0.15          # Max 15% of bankroll per day across all agents
  max_agent_stake_pct: 0.03          # Max 3% of bankroll per agent per day
  half_kelly_cap: 0.10               # Hard ceiling on any single Kelly bet
  cool_down_days: 3                  # Days to pause agent after threshold breach
  cool_down_roi_threshold: -0.20     # 30-day ROI < -20% → cool-down
  cool_down_clv_threshold: -0.030    # 30-day CLV < -3% → cool-down
  cool_down_brier_threshold: 0.28    # 30-day Brier score > 0.28 → cool-down (0.25 = perfect)

# ---------------------------------------------------------------------------
# FALLBACK MODES
# When a data feed fails, the system degrades gracefully rather than crashing.
# ---------------------------------------------------------------------------
fallback:
  base_rate_only_prob_threshold: 0.56   # Tighter gate when projections are missing
  base_rate_only_confidence_gate: 8     # Raise confidence threshold in base-rate-only mode
  disable_statcast_on_failure: true     # Statcast down → zero its contribution
  disable_fangraphs_on_failure: true    # FanGraphs down → zero its contribution (already graceful)
  disable_sbd_agents_on_failure:        # These agents need SBD trends — auto-disable if feed fails
    - FadeAgent
  disable_draftedge_agents_on_failure:  # These agents rely heavily on DraftEdge projections
    - MLEdgeAgent
  alert_on_feed_failure: true           # Discord alert when any primary feed goes down

# ---------------------------------------------------------------------------
# CALIBRATION
# Run weekly (Sundays). Alert if Brier score or reliability degrades.
# ---------------------------------------------------------------------------
calibration:
  min_sample_size: 50               # Don't score calibration until N settled bets
  brier_alert_threshold: 0.26       # Alert if overall Brier exceeds this
  reliability_bucket_size: 0.05     # 5-point buckets: [0.50-0.55), [0.55-0.60), etc.
  rolling_window_days: 30           # Window for rolling calibration checks

# ---------------------------------------------------------------------------
# AGENT DEFINITIONS
# Fields per agent:
#   enabled:          Master on/off switch
#   min_prob:         Minimum win probability to fire
#   min_edge_pct:     Minimum EV edge (decimal) to fire
#   max_legs:         Hard cap on legs per parlay
#   confidence_gate:  Minimum confidence score (0-10) to post to Discord
#   depends_on_feeds: List of feeds this agent requires — auto-disabled if any fail
#   cool_down_active: Set to true manually or auto-set by risk_manager.py
#   cool_down_until:  ISO date — agent skips until this date passes
#   notes:            Human-readable rationale
# ---------------------------------------------------------------------------
